<script>
var mode='linux';
var dayNames=['日','一','二','三','四','五','六'];
var monthNames=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function setMode(m){
mode=m;
document.querySelectorAll('.format-btn').forEach(function(b){b.classList.remove('active');if(b.dataset.mode===m)b.classList.add('active');});
var fields=document.getElementById('fields');
if(m==='linux'){
fields.innerHTML=document.querySelector('#fields').innerHTML;
}else{
// Quartz mode adds seconds and optional year
}
update();
}

function setField(i,v){
document.getElementById('f'+i).value=v;update();
}

function update(){
var parts=[];
for(var i=0;i<5;i++){parts.push(document.getElementById('f'+i).value||'*');}
var expr=parts.join(' ');
document.getElementById('cronExpr').textContent=expr;
document.getElementById('cronDesc').textContent=explainCron(parts);
document.getElementById('cronNext').textContent=getNextRuns(parts);
}

function explainCron(parts){
var m=parts[0],h=parts[1],d=parts[2],mo=parts[3],w=parts[4];
var allStar=m==='*'&&h==='*'&&d==='*'&&mo==='*'&&w==='*';

if(m==='*'&&h==='*'&&d==='*'&&mo==='*'&&w==='*')return'每分钟执行';

var desc=[];

// Time description
if(m==='*'&&h==='*')desc.push('每分钟');
else if(m.startsWith('*/')&&h==='*')desc.push('每'+m.slice(2)+'分钟');
else if(h.startsWith('*/')&&m==='0')desc.push('每'+h.slice(2)+'小时');
else{
if(h!=='*'){
var hDesc=parseRange(h,'小时');
if(hDesc)desc.push(hDesc);
}
if(m!=='*'){
var mDesc=parseRange(m,'分');
if(mDesc)desc.push(mDesc);
if(h==='*')desc.push('每小时');
}
}

if(desc.length===0)desc.push('指定时间');

// Day description
if(d==='*'&&w==='*'&&mo==='*'){
desc.push('每天');
}else if(w!=='*'){
var wDesc=parseDayOfWeek(w);
if(wDesc)desc.push(wDesc);
}else if(d!=='*'){
var dDesc=parseRange(d,'号');
if(dDesc)desc.push('每月的'+dDesc);
}else if(mo!=='*'){
var moDesc=parseRange(mo,'月');
if(moDesc)desc.push(moDesc);
}

return desc.join('，')+'执行';
}

function parseRange(v,unit){
if(v==='*')return null;
if(v.startsWith('*/'))return'每'+v.slice(2)+unit;
if(v.includes(','))return v.split(',').map(function(x){return x+unit;}).join('、');
if(v.includes('-')){var r=v.split('-');return r[0]+unit+'到'+r[1]+unit;}
return v+unit;
}

function parseDayOfWeek(v){
if(v==='*')return null;
if(v==='1-5')return'每个工作日(周一至周五)';
if(v==='0,6'||v==='6,0')return'每个周末';
if(v==='0')return'每周日';
if(v==='1')return'每周一';
var map={'0':'周日','1':'周一','2':'周二','3':'周三','4':'周四','5':'周五','6':'周六'};
if(map[v])return'每'+map[v];
if(v.includes(','))return v.split(',').map(function(x){return map[x]||x;}).join('、');
return v;
}

function getNextRuns(parts){
var now=new Date();
var runs=[];
var t=new Date(now);
t.setSeconds(0,0);
for(var n=0;n<5&&runs.length<3;n++){
t.setMinutes(t.getMinutes()+1);
if(matches(t,parts))runs.push(new Date(t));
}
if(runs.length===0)return'';
return'接下来: '+runs.map(function(d){return d.toLocaleString('zh-CN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}).join(' · ');
}

function matches(date,parts){
var m=date.getMinutes(),h=date.getHours(),d=date.getDate(),mo=date.getMonth()+1,w=date.getDay();
return matchField(m,parts[0])&&matchField(h,parts[1])&&matchField(d,parts[2])&&matchField(mo,parts[3])&&matchField(w,parts[4]);
}

function matchField(val,pattern){
if(pattern==='*')return true;
if(pattern.startsWith('*/')){var n=parseInt(pattern.slice(2));return val%n===0;}
if(pattern.includes(','))return pattern.split(',').some(function(p){return matchField(val,p);});
if(pattern.includes('-')){var r=pattern.split('-');return val>=parseInt(r[0])&&val<=parseInt(r[1]);}
return val===parseInt(pattern);
}

function copyCron(){
var expr=document.getElementById('cronExpr').textContent;
navigator.clipboard.writeText(expr).then(function(){toast('Cron表达式已复制: '+expr);});
}

function resetCron(){
for(var i=0;i<5;i++)document.getElementById('f'+i).value='*';
update();
}

function toast(m){
var t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(function(){t.remove();},1800);
}

document.querySelectorAll('.preset-btn').forEach(function(btn){
btn.addEventListener('click',function(){
var parts=btn.dataset.expr.split(' ');
for(var i=0;i<5;i++)document.getElementById('f'+i).value=parts[i]||'*';
update();
document.querySelectorAll('.preset-btn').forEach(function(b){b.classList.remove('active');});
btn.classList.add('active');
});
});

update();
</script>
